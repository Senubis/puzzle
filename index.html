<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>线索页</title>
<style>
body {
    background-color: black;
    margin: 0;
    text-align: center;
    font-family: "Microsoft YaHei", sans-serif;
}

.top-text {
    color: #4da6ff; /* 蓝色 */
    font-size: 24px;
    margin-top: 60px;
}

img {
    margin: 30px 0;
    max-width: 80%;
}

.bottom-text {
    color: white;
    font-size: 20px;
    margin-bottom: 60px;
}
</style>
</head>

<body>

<div class="top-text">
    “和第一届梨棠春荟同岁的，还有一面墙壁，下一个谜团的密码就藏在那里，密码是它第一年所有的砖的数目。提示：它藏在老学长的身后，图书馆的那一侧——不卖关子了，它就是毕业生纪念墙……[文件已损坏]”
</div>

<img src="image.jpg" alt="半张图片">

<div class="bottom-text">
  坏得真不是时候啊，对吧，这个奇怪的小协会果然是个草台班子——没准这个文案还是在游园会前一天通宵赶出来的。除此之外你只能看到一张——半张照片。这个颜色的砖在津南校区到处都是，它在哪呢？
</div>

</body>
</html>
